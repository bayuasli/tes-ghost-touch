<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Touch Analyzer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>// Touch Analyzer</h1>
  <div class="status-dot"></div>
</header>

<div class="stats" id="stats-top">
  <div class="stat">
    <div class="stat-label">Total Tap</div>
    <div class="stat-value v-total" id="s-total">0</div>
    <div class="stat-unit">touches</div>
  </div>
  <div class="stat">
    <div class="stat-label">Rate</div>
    <div class="stat-value v-rate" id="s-rate">0</div>
    <div class="stat-unit">tap/s</div>
  </div>
  <div class="stat">
    <div class="stat-label">Max Finger</div>
    <div class="stat-value v-multi" id="s-multi">0</div>
    <div class="stat-unit">simultaneous</div>
  </div>
</div>

<div class="stats" id="stats-bottom">
  <div class="stat">
    <div class="stat-label">Durasi</div>
    <div class="stat-value v-dim" id="s-dur">0.0</div>
    <div class="stat-unit">detik</div>
  </div>
  <div class="stat">
    <div class="stat-label">Hold Avg</div>
    <div class="stat-value v-dim" id="s-hold">0</div>
    <div class="stat-unit">ms</div>
  </div>
  <div class="stat">
    <div class="stat-label">Peak/s</div>
    <div class="stat-value v-dim" id="s-peak">0</div>
    <div class="stat-unit">max tap/s</div>
  </div>
  <div class="stat">
    <div class="stat-label">Interval</div>
    <div class="stat-value v-dim" id="s-interval">—</div>
    <div class="stat-unit">ms avg</div>
  </div>
</div>

<div id="zone">
  <div class="zone-hint" id="hint">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#00e5ff" stroke-width="1.5">
      <path d="M24 4 C24 4 24 20 24 24" stroke-linecap="round"/>
      <path d="M20 8 C20 8 16 14 16 24 C16 32 20 40 24 44 C28 40 32 32 32 24 C32 14 28 8 28 8" stroke-linecap="round"/>
      <ellipse cx="16" cy="24" rx="4" ry="12"/>
      <ellipse cx="32" cy="24" rx="4" ry="12"/>
    </svg>
    <p>Sentuh area ini</p>
  </div>

  <div id="finger-bar">
    <div class="finger-pip" id="fp0"></div>
    <div class="finger-pip" id="fp1"></div>
    <div class="finger-pip" id="fp2"></div>
    <div class="finger-pip" id="fp3"></div>
    <div class="finger-pip" id="fp4"></div>
  </div>

  <div id="speed-bar-wrap">
    <div id="speed-bar"></div>
  </div>
</div>

<div id="log-panel"></div>

<footer>
  <button onclick="exportData()">[ Export ]</button>
  <button class="danger" onclick="resetAll()">[ Reset ]</button>
</footer>

<script src="js/app.js"></script>
</body>
</html>
